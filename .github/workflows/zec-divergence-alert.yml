name: 📊 ZEC/USD · Divergence Scanner

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      force_alert:
        description: 'Forzar issue aunque no haya señal fresca'
        required: false
        default: 'false'

# GITHUB_TOKEN automático — sin secrets adicionales necesarios
permissions:
  issues: write
  contents: read

jobs:
  scan:
    name: Scan ZEC/USD
    runs-on: ubuntu-latest
    steps:
      - name: 🔍 ZEC/USD Divergence Scanner — P1/P2/P3
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // ══════════════════════════════════════
            // CONFIG
            // ══════════════════════════════════════
            const KRAKEN_PAIR = 'ZECUSD';
            const ASSET_LABEL = 'ZEC/USD';
            const TV_SYMBOL   = 'KRAKEN:ZECUSD';
            const TIMEFRAMES  = [{label:'1H',mins:60},{label:'4H',mins:240}];
            const LOOKBACK    = 3;
            const FRESH_N     = 10;
            const SESSION_UTC = {start:7, end:22};
            const FORCE       = '${{ github.event.inputs.force_alert }}' === 'true';

            // ══════════════════════════════════════
            // HELPERS — Bogotá GMT-5
            // ══════════════════════════════════════
            const fp = n => n===null||n===undefined ? '—'
              : Math.abs(n)>=100 ? n.toFixed(2)
              : Math.abs(n)>=1   ? n.toFixed(3) : n.toFixed(5);

            function ftBog(u) {
              // Unix timestamp → Bogotá time string (GMT-5)
              return new Date(u*1000).toLocaleString('es-CO', {
                timeZone: 'America/Bogota',
                year:'numeric', month:'2-digit', day:'2-digit',
                hour:'2-digit', minute:'2-digit', hour12:false
              }) + ' BOG';
            }
            function nowBog() {
              // Current time in Bogotá
              return new Date().toLocaleString('es-CO', {
                timeZone: 'America/Bogota',
                year:'numeric', month:'2-digit', day:'2-digit',
                hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false
              }) + ' BOG';
            }
            function nowBogHour() {
              // Just the hour in Bogotá — for issue title dedup
              return new Date().toLocaleString('es-CO', {
                timeZone:'America/Bogota', hour:'2-digit', hour12:false
              }).padStart(2,'0') + 'h BOG';
            }
            const em = t => t==='BULLISH' ? '🟢' : '🔴';
            const dr = t => t==='BULLISH' ? '▲ ALCISTA (COMPRA)' : '▼ BAJISTA (SHORT)';
            const pl = {1:'🚨 P1 ENTRADA', 2:'⚠️ P2 WATCH', 3:'📡 P3 RADAR'};

            // ══════════════════════════════════════
            // FETCH — Kraken pública, sin auth
            // ══════════════════════════════════════
            async function fetchKlines(pair, mins) {
              const url = 'https://api.kraken.com/0/public/OHLC?pair='+pair+'&interval='+mins;
              const res = await fetch(url);
              if (!res.ok) throw new Error('Kraken HTTP '+res.status);
              const j = await res.json();
              if (j.error && j.error.length) throw new Error(j.error[0]);
              const key = Object.keys(j.result).find(k => k !== 'last');
              const rows = j.result[key];
              if (!rows || !rows.length) throw new Error('Sin datos Kraken');
              return rows.map(r => ({
                time:+r[0], open:+r[1], high:+r[2],
                low:+r[3], close:+r[4], volume:+r[6]
              }));
            }

            // ══════════════════════════════════════
            // INDICATORS
            // ══════════════════════════════════════
            function calcRSI(closes, p=14) {
              const out = new Array(closes.length).fill(null);
              if (closes.length<=p) return out;
              let ag=0, al=0;
              for (let i=1;i<=p;i++) {
                const d=closes[i]-closes[i-1];
                if(d>=0) ag+=d; else al-=d;
              }
              ag/=p; al/=p;
              out[p] = al===0 ? 100 : 100-100/(1+ag/al);
              for (let i=p+1;i<closes.length;i++) {
                const d=closes[i]-closes[i-1];
                ag=(ag*(p-1)+Math.max(d,0))/p;
                al=(al*(p-1)+Math.max(-d,0))/p;
                out[i] = al===0 ? 100 : 100-100/(1+ag/al);
              }
              return out;
            }

            function calcEMAArr(vals, p) {
              const out=new Array(vals.length).fill(null), k=2/(p+1);
              let s=0;
              while(s<vals.length && vals[s]===null) s++;
              if(s+p>vals.length) return out;
              let sum=0;
              for(let i=s;i<s+p;i++) sum+=vals[i];
              out[s+p-1]=sum/p;
              for(let i=s+p;i<vals.length;i++) out[i]=vals[i]*k+out[i-1]*(1-k);
              return out;
            }

            function calcMACD(closes) {
              const ef=calcEMAArr(closes,12), es=calcEMAArr(closes,26);
              const line=closes.map((_,i)=>ef[i]!==null&&es[i]!==null?ef[i]-es[i]:null);
              const sig=calcEMAArr(line,9);
              return {line, signal:sig, hist:line.map((v,i)=>v!==null&&sig[i]!==null?v-sig[i]:null)};
            }

            function calcOBV(cands) {
              const out=new Array(cands.length).fill(0);
              out[0]=cands[0]?.volume||0;
              for(let i=1;i<cands.length;i++) {
                const d=cands[i].close-cands[i-1].close;
                out[i]=out[i-1]+(d>0?cands[i].volume:d<0?-cands[i].volume:0);
              }
              return out;
            }

            function calcStochRSI(rsiArr, rp=14, ks=3, ds=3) {
              const n=rsiArr.length, rawK=new Array(n).fill(null);
              for(let i=rp-1;i<n;i++) {
                if(rsiArr[i]===null) continue;
                const sl=rsiArr.slice(i-rp+1,i+1).filter(v=>v!==null);
                if(sl.length<rp) continue;
                const mn=Math.min(...sl), mx=Math.max(...sl);
                rawK[i]=mx===mn?0:((rsiArr[i]-mn)/(mx-mn))*100;
              }
              const kLine=new Array(n).fill(null);
              for(let i=ks-1;i<n;i++) {
                const s=[];
                for(let j=i-ks+1;j<=i;j++) if(rawK[j]!==null) s.push(rawK[j]);
                if(s.length===ks) kLine[i]=s.reduce((a,b)=>a+b,0)/ks;
              }
              const dLine=new Array(n).fill(null);
              for(let i=ds-1;i<n;i++) {
                const s=[];
                for(let j=i-ds+1;j<=i;j++) if(kLine[j]!==null) s.push(kLine[j]);
                if(s.length===ds) dLine[i]=s.reduce((a,b)=>a+b,0)/ds;
              }
              return {k:kLine, d:dLine};
            }

            function calcATR(cands, p=14) {
              const tr=new Array(cands.length).fill(null);
              for(let i=1;i<cands.length;i++) {
                const h=cands[i].high, l=cands[i].low, pc=cands[i-1].close;
                tr[i]=Math.max(h-l, Math.abs(h-pc), Math.abs(l-pc));
              }
              return calcEMAArr(tr,p);
            }

            function calcBBPos(closes, p=20, mult=2) {
              const out=new Array(closes.length).fill(null);
              for(let i=p-1;i<closes.length;i++) {
                const sl=closes.slice(i-p+1,i+1);
                const mean=sl.reduce((a,b)=>a+b,0)/p;
                const std=Math.sqrt(sl.reduce((s,v)=>s+(v-mean)**2,0)/p);
                out[i]=std===0?0.5:(closes[i]-(mean-mult*std))/(2*mult*std);
              }
              return out;
            }

            function calcVolAvg(cands, p=20) {
              const out=new Array(cands.length).fill(null);
              for(let i=p-1;i<cands.length;i++) {
                let sum=0;
                for(let j=i-p+1;j<=i;j++) sum+=cands[j].volume;
                out[i]=sum/p;
              }
              return out;
            }

            function hasVolumeSpike(cands, volAvg, idx) {
              if(!volAvg[idx]||volAvg[idx]===0) return false;
              return cands[idx].volume >= volAvg[idx] * 1.5;
            }

            function getTrendContext(type, closes, ema21arr, ema50arr) {
              const n=closes.length-1;
              const e21=ema21arr[n], e50=ema50arr[n];
              if(!e21||!e50) return 'neutral';
              const price=closes[n];
              if(type==='BULLISH') {
                if(price>e21 && e21>e50) return 'with';
                if(price<e50) return 'against';
              } else {
                if(price<e21 && e21<e50) return 'with';
                if(price>e50) return 'against';
              }
              return 'neutral';
            }

            // ══════════════════════════════════════
            // PIVOTS + DIVERGENCE DETECTION
            // ══════════════════════════════════════
            function findPivots(cands) {
              const hi=[],lo=[];
              for(let i=LOOKBACK;i<cands.length-LOOKBACK;i++) {
                let isH=true, isL=true;
                for(let j=i-LOOKBACK;j<=i+LOOKBACK;j++) {
                  if(j===i) continue;
                  if(cands[j].high>=cands[i].high) isH=false;
                  if(cands[j].low<=cands[i].low)   isL=false;
                }
                if(isH) hi.push(i);
                if(isL) lo.push(i);
              }
              return {hi,lo};
            }

            function detectDivs(cands, ind, name) {
              const n=cands.length, from=Math.max(0,n-200);
              const sub=cands.slice(from), indS=ind.slice(from);
              const {hi,lo}=findPivots(sub);
              const out=[];
              // Bullish: price Lower Low + indicator Higher Low
              for(let i=1;i<lo.length;i++) {
                const a=lo[i-1], b=lo[i];
                if(indS[a]===null||indS[b]===null) continue;
                if(sub[b].low<sub[a].low && indS[b]>indS[a]) {
                  const ab=from+b;
                  out.push({type:'BULLISH', ind:name,
                    ta:cands[from+a].time, tb:cands[ab].time,
                    pa:cands[from+a].low,  pb:cands[ab].low,
                    va:indS[a], vb:indS[b],
                    fresh: ab>=n-(FRESH_N+LOOKBACK)});
                }
              }
              // Bearish: price Higher High + indicator Lower High
              for(let i=1;i<hi.length;i++) {
                const a=hi[i-1], b=hi[i];
                if(indS[a]===null||indS[b]===null) continue;
                if(sub[b].high>sub[a].high && indS[b]<indS[a]) {
                  const ab=from+b;
                  out.push({type:'BEARISH', ind:name,
                    ta:cands[from+a].time, tb:cands[ab].time,
                    pa:cands[from+a].high, pb:cands[ab].high,
                    va:indS[a], vb:indS[b],
                    fresh: ab>=n-(FRESH_N+LOOKBACK)});
                }
              }
              return out;
            }

            // ══════════════════════════════════════
            // PRIORITY — OBV weighted (OBV=2, rest=1, max=4)
            // ══════════════════════════════════════
            function getPriority(cands, closes, sD, mD, oD, atrArr, bbPosArr, ema21arr, ema50arr, volAvgArr) {
              const fresh=[...sD,...mD,...oD].filter(d=>d.fresh);
              if(!fresh.length) return null;

              const W={SRSI:1,MACD:1,OBV:2};
              const inds=['SRSI','MACD','OBV'];
              let bS=0, brS=0;
              inds.forEach(nm=>{
                if(fresh.some(d=>d.ind===nm&&d.type==='BULLISH')) bS+=W[nm];
                if(fresh.some(d=>d.ind===nm&&d.type==='BEARISH')) brS+=W[nm];
              });

              const topType  = bS>=brS ? 'BULLISH' : 'BEARISH';
              const topScore = Math.max(bS, brS);
              const n        = cands.length;
              const last     = cands[n-1], prev=cands[n-2]||last;
              const lastATR  = atrArr.slice().reverse().find(v=>v!==null)||0;
              const lastBBP  = bbPosArr.slice().reverse().find(v=>v!==null);
              const minMove  = lastATR*0.2;

              // Relaxed confirmation: 1 of 3 conditions
              const bs3=(last.close>last.open?1:0)+(last.close>prev.high?1:0)+((last.close-prev.close)>minMove?1:0);
              const bs4=(last.close<last.open?1:0)+(last.close<prev.low?1:0)+((prev.close-last.close)>minMove?1:0);
              const confirmed = topType==='BULLISH' ? bs3>=1 : bs4>=1;

              const utcH    = new Date().getUTCHours();
              const inSess  = utcH>=SESSION_UTC.start && utcH<SESSION_UTC.end;
              const bbCtx   = lastBBP!==null ? (topType==='BULLISH'?lastBBP<0.35:lastBBP>0.65) : false;
              const agree   = inds.filter(nm=>fresh.some(d=>d.ind===nm&&d.type===topType));
              const hasOBV  = fresh.some(d=>d.ind==='OBV'&&d.type===topType);

              // Volume spike at last fresh pivot
              let volSpike = false;
              const freshTop = fresh.filter(d=>d.type===topType);
              if(freshTop.length && volAvgArr.length) {
                const lastIb = freshTop[freshTop.length-1];
                const idx    = cands.findIndex(c=>c.time===lastIb.tb);
                if(idx>=0) volSpike = hasVolumeSpike(cands, volAvgArr, idx);
              }

              // Trend context
              const trendCtx = getTrendContext(topType, closes, ema21arr, ema50arr);

              const entry = last.close;
              const sl    = topType==='BULLISH' ? entry-lastATR*1.5 : entry+lastATR*1.5;
              const tp    = topType==='BULLISH' ? entry+lastATR*2.5 : entry-lastATR*2.5;
              const scoreStr = topScore+'/4';

              let level = 3;
              if(topScore>=3 && confirmed && inSess) level=1;
              else if(topScore>=2) level=2;

              return {level,topType,topScore,hasOBV,scoreStr,confirmed,
                inSess,bbCtx,agree,entry,sl,tp,lastATR,utcH,volSpike,trendCtx};
            }

            // ══════════════════════════════════════
            // DEDUP — evitar issues repetidos
            // ══════════════════════════════════════
            const existing=await github.rest.issues.listForRepo({
              owner:context.repo.owner, repo:context.repo.repo,
              labels:'divergence', state:'open', per_page:50,
            });
            const openTitles=new Set(existing.data.map(i=>i.title));

            // ══════════════════════════════════════
            // MAIN SCAN
            // ══════════════════════════════════════
            let created=0;

            for (const {label,mins} of TIMEFRAMES) {
              console.log('\n── '+ASSET_LABEL+' / '+label+' ──');
              try {
                const cands   = await fetchKlines(KRAKEN_PAIR, mins);
                const closes  = cands.map(c=>c.close);
                const rsi     = calcRSI(closes);
                const srsi    = calcStochRSI(rsi, 14, 3, 3);
                const macd    = calcMACD(closes);
                const obv     = calcOBV(cands);
                const atrArr  = calcATR(cands);
                const bbPos   = calcBBPos(closes);
                const volAvg  = calcVolAvg(cands, 20);
                const ema21   = calcEMAArr(closes, 21);
                const ema50   = calcEMAArr(closes, 50);

                const lastClose = cands[cands.length-1].close;
                const lastK     = srsi.k.slice().reverse().find(v=>v!==null);
                const lastD     = srsi.d.slice().reverse().find(v=>v!==null);
                const lastH     = macd.hist.slice().reverse().find(v=>v!==null);
                const lastATR   = atrArr.slice().reverse().find(v=>v!==null)||0;
                const lastBBP   = bbPos.slice().reverse().find(v=>v!==null);
                const lastE21   = ema21.slice().reverse().find(v=>v!==null);
                const lastE50   = ema50.slice().reverse().find(v=>v!==null);

                const sD    = detectDivs(cands, srsi.d, 'SRSI');
                const mD    = detectDivs(cands, macd.line, 'MACD');
                const oD    = detectDivs(cands, obv, 'OBV');
                const fresh = [...sD,...mD,...oD].filter(d=>d.fresh);

                const prio  = getPriority(cands, closes, sD, mD, oD, atrArr, bbPos, ema21, ema50, volAvg);
                console.log('   Fresh: '+fresh.length+' | Prio: '+(prio?pl[prio.level]:'NONE'));

                if(!fresh.length && !FORCE) {
                  console.log('   → Sin divergencias frescas'); continue;
                }

                const toAlert    = FORCE ? [...sD,...mD,...oD].slice(-4) : fresh;
                const prioLevel  = prio ? prio.level : 3;
                const prioType   = prio ? prio.topType : (fresh[0]?.type||'BULLISH');
                const isBull     = prioType==='BULLISH';

                // Title uses Bogotá hour for dedup
                const title = pl[prioLevel]+' '+em(prioType)+' ['+ASSET_LABEL+'/'+label+'] '+dr(prioType)+' · '+nowBogHour();

                if(openTitles.has(title)) {
                  console.log('   → Duplicado, omitiendo'); continue;
                }

                // ── Explanation text per indicator ──
                function getIndExplain(ind, type) {
                  const iB = type==='BULLISH';
                  if(ind==='SRSI') return iB
                    ? 'Stoch RSI: precio hace mínimo más bajo pero el indicador no — el momentum bajista se agota.'
                    : 'Stoch RSI: precio hace máximo más alto pero el indicador no — el momentum alcista se agota.';
                  if(ind==='MACD') return iB
                    ? 'MACD: histograma diverge con el precio — el impulso bajista pierde fuerza.'
                    : 'MACD: histograma diverge con el precio — el impulso alcista pierde fuerza.';
                  if(ind==='OBV') return iB
                    ? 'OBV (peso x2): volumen REAL sube mientras precio baja — acumulación institucional silenciosa.'
                    : 'OBV (peso x2): volumen REAL baja mientras precio sube — distribución institucional silenciosa.';
                  return 'Divergencia detectada.';
                }

                // ── Build issue body ──
                const nl = '\n';
                const divLines = toAlert.map(d =>
                  '**'+d.ind+(d.ind==='OBV'?' ⭐':'')+'** '+em(d.type)+' '+d.type+nl+
                  '   Pivot 1: '+ftBog(d.ta)+' — $'+fp(d.pa)+nl+
                  '   Pivot 2: '+ftBog(d.tb)+' — $'+fp(d.pb)+nl+
                  '   _'+getIndExplain(d.ind,d.type)+'_'
                ).join(nl+nl);

                const actionTxt = prioLevel===1
                  ? (isBull ? 'Vela verde confirmó. Considera COMPRAR ahora. Verifica en TradingView.' : 'Vela roja confirmó. Considera SHORT ahora. Verifica en TradingView.')
                  : prioLevel===2
                  ? 'Espera la vela de confirmación. Prepara la orden con los niveles abajo.'
                  : 'Señal temprana (P3). Observa el chart. No entres sin confirmación.';

                const scoreDisp  = prio ? prio.scoreStr : '—/4';
                const agreeDisp  = prio ? prio.agree.join(' + ') : toAlert.map(d=>d.ind).filter((v,i,a)=>a.indexOf(v)===i).join('+');
                const obvStatus  = prio?.hasOBV ? '✅ OBV CONFIRMA (mayor confiabilidad)' : '⚠️ Sin OBV — señal de menor peso';
                const volStatus  = prio?.volSpike ? '⚡ PICO DE VOLUMEN — señal más confiable' : '— Sin pico de volumen';
                const trendDisp  = prio?.trendCtx==='with' ? '↑ CON TENDENCIA (EMA21>EMA50 para bull)' : prio?.trendCtx==='against' ? '↓ CONTRA TENDENCIA — reducir posición' : '— Neutro';
                const sesionDisp = prio?.inSess ? '🟢 Activa ('+prio.utcH+'h UTC)' : '🔴 Fuera sesión ('+new Date().getUTCHours()+'h UTC)';
                const bbDisp     = lastBBP!=null ? (lastBBP<0.35?'🟢 Cerca banda inferior — favorece BULL':lastBBP>0.65?'🔴 Cerca banda superior — favorece BEAR':'⚪ Zona media') : '—';
                const confDisp   = prio?.confirmed ? '✅ Vela de confirmación detectada' : '⏳ Esperando vela de confirmación';
                const entryDisp  = prio ? '~$'+fp(prio.entry) : '~$'+fp(lastClose);
                const slDisp     = prio ? '$'+fp(prio.sl) : '—';
                const tpDisp     = prio ? '$'+fp(prio.tp) : '—';

                const bodyLines = [
                  '## '+pl[prioLevel]+' '+em(prioType)+' '+dr(prioType),
                  '### '+ASSET_LABEL+' · '+label+' · Detectado: '+nowBog(),
                  '',
                  '---',
                  '### 📊 Resumen ejecutivo',
                  '',
                  'Prioridad: **'+pl[prioLevel]+'** ('+scoreDisp+')',
                  'Dirección: **'+(isBull?'▲ COMPRA / LONG':'▼ SHORT / VENTA')+'**',
                  'Indicadores: **'+agreeDisp+'**',
                  '',
                  obvStatus,
                  volStatus,
                  'Tendencia EMA: '+trendDisp,
                  'Sesión: '+sesionDisp,
                  'Bollinger: '+bbDisp,
                  'Confirmación: '+confDisp,
                  '',
                  '---',
                  '### 💰 Niveles de trading',
                  '',
                  'Precio actual: $'+fp(lastClose),
                  'Entrada sugerida: **'+entryDisp+'**',
                  'Stop Loss: **'+slDisp+'** (ATR × 1.5)',
                  'Take Profit: **'+tpDisp+'** (ATR × 2.5)',
                  'Risk/Reward: **1.67 : 1**',
                  'ATR(14): $'+fp(lastATR),
                  '',
                  '---',
                  '### 📈 Indicadores actuales',
                  '',
                  'Stoch RSI K: '+( lastK!=null?lastK.toFixed(1):'—' ),
                  'Stoch RSI D: '+( lastD!=null?lastD.toFixed(1):'—' ),
                  'MACD Hist: '+( lastH!=null?lastH.toFixed(5):'—' ),
                  'BB Pos: '+( lastBBP!=null?lastBBP.toFixed(2):'—' )+' (0=banda baja, 1=banda alta)',
                  'EMA21: $'+( lastE21!=null?fp(lastE21):'—' ),
                  'EMA50: $'+( lastE50!=null?fp(lastE50):'—' ),
                  '',
                  '---',
                  '### 🔍 Divergencias detectadas',
                  '',
                  divLines,
                  '',
                  '---',
                  '### ⚡ Acción recomendada',
                  '',
                  actionTxt,
                  '',
                  '🔗 [Ver en TradingView](https://www.tradingview.com/chart/?symbol='+TV_SYMBOL+'&interval='+(mins===60?'60':'240')+')',
                  '',
                  '---',
                  '_Scanner automático · '+nowBog()+' · P'+prioLevel+'_',
                ];
                const body = bodyLines.join(nl);

                await github.rest.issues.create({
                  owner:context.repo.owner, repo:context.repo.repo,
                  title, body,
                  labels:['divergence','p'+prioLevel,prioType.toLowerCase(),label.toLowerCase(),'zec'],
                });
                console.log('   ✅ Issue creado: '+title);
                created++;
                await new Promise(r=>setTimeout(r,600));

              } catch(err) {
                console.error('   ❌ Error en '+label+':', err.message);
              }
              await new Promise(r=>setTimeout(r,400));
            }

            console.log('\n📊 Scan completo — Issues creados: '+created);
