name: 📊 ZEC/USD · Divergence Scanner

on:
  schedule:
    - cron: '0 * * * *'   # cada hora UTC
  workflow_dispatch:
    inputs:
      force_alert:
        description: 'Crear issue aunque no haya divergencia fresca'
        required: false
        default: 'false'

# GITHUB_TOKEN es automático — NO necesitas configurar ningún secret
permissions:
  issues: write
  contents: read

jobs:
  scan:
    name: Scan ZEC/USD
    runs-on: ubuntu-latest
    steps:
      - name: 🔍 Detectar divergencias ZEC/USD y abrir Issues
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // ════════════════════════════════════
            // CONFIG
            // ════════════════════════════════════
            const KRAKEN_PAIR = 'ZECUSD';
            const ASSET_LABEL = 'ZEC/USD';
            const TIMEFRAMES  = [
              { label: '1H', mins: 60  },
              { label: '4H', mins: 240 },
            ];
            const LOOKBACK = 5;
            const FRESH_N  = 5;
            const FORCE    = '${{ github.event.inputs.force_alert }}' === 'true';

            // ════════════════════════════════════
            // KRAKEN FETCH — público, sin API key
            // ════════════════════════════════════
            async function fetchKlines(pair, mins) {
              const url = `https://api.kraken.com/0/public/OHLC?pair=${pair}&interval=${mins}`;
              const res = await fetch(url);
              if (!res.ok) throw new Error(`Kraken HTTP ${res.status}`);
              const json = await res.json();
              if (json.error && json.error.length) throw new Error(json.error[0]);
              const key  = Object.keys(json.result).find(k => k !== 'last');
              const rows = json.result[key];
              if (!rows || !rows.length) throw new Error('Sin datos — par no encontrado');
              // [time, open, high, low, close, vwap, volume, count]
              return rows.map(r => ({
                time: +r[0], open: +r[1], high: +r[2],
                low:  +r[3], close: +r[4], volume: +r[6],
              }));
            }

            // ════════════════════════════════════
            // RSI
            // ════════════════════════════════════
            function calcRSI(closes, p = 14) {
              const out = new Array(closes.length).fill(null);
              if (closes.length <= p) return out;
              let ag = 0, al = 0;
              for (let i = 1; i <= p; i++) {
                const d = closes[i] - closes[i-1];
                if (d >= 0) ag += d; else al -= d;
              }
              ag /= p; al /= p;
              out[p] = al === 0 ? 100 : 100 - 100 / (1 + ag / al);
              for (let i = p + 1; i < closes.length; i++) {
                const d = closes[i] - closes[i-1];
                ag = (ag * (p-1) + Math.max(d,  0)) / p;
                al = (al * (p-1) + Math.max(-d, 0)) / p;
                out[i] = al === 0 ? 100 : 100 - 100 / (1 + ag / al);
              }
              return out;
            }

            // ════════════════════════════════════
            // EMA / MACD
            // ════════════════════════════════════
            function calcEMA(vals, p) {
              const out = new Array(vals.length).fill(null);
              const k = 2 / (p + 1);
              let s = 0;
              while (s < vals.length && vals[s] === null) s++;
              if (s + p > vals.length) return out;
              let sum = 0;
              for (let i = s; i < s + p; i++) sum += vals[i];
              out[s + p - 1] = sum / p;
              for (let i = s + p; i < vals.length; i++)
                out[i] = vals[i] * k + out[i-1] * (1 - k);
              return out;
            }

            function calcMACD(closes) {
              const ef = calcEMA(closes, 12);
              const es = calcEMA(closes, 26);
              return closes.map((_, i) =>
                ef[i] !== null && es[i] !== null ? ef[i] - es[i] : null);
            }

            // ════════════════════════════════════
            // OBV
            // ════════════════════════════════════
            function calcOBV(cands) {
              const out = new Array(cands.length).fill(0);
              out[0] = cands[0]?.volume || 0;
              for (let i = 1; i < cands.length; i++) {
                const d = cands[i].close - cands[i-1].close;
                out[i] = out[i-1] + (d > 0 ? cands[i].volume : d < 0 ? -cands[i].volume : 0);
              }
              return out;
            }

            // ════════════════════════════════════
            // PIVOTS + DIVERGENCIAS
            // ════════════════════════════════════
            function findPivots(cands) {
              const hi = [], lo = [];
              for (let i = LOOKBACK; i < cands.length - LOOKBACK; i++) {
                let isH = true, isL = true;
                for (let j = i - LOOKBACK; j <= i + LOOKBACK; j++) {
                  if (j === i) continue;
                  if (cands[j].high >= cands[i].high) isH = false;
                  if (cands[j].low  <= cands[i].low)  isL = false;
                }
                if (isH) hi.push(i);
                if (isL) lo.push(i);
              }
              return { hi, lo };
            }

            function detectDivs(cands, ind, name) {
              const n    = cands.length;
              const from = Math.max(0, n - 120);
              const sub  = cands.slice(from);
              const indS = ind.slice(from);
              const { hi, lo } = findPivots(sub);
              const out = [];

              // Bullish: precio LL + indicador HL
              for (let i = 1; i < lo.length; i++) {
                const a = lo[i-1], b = lo[i];
                if (indS[a] === null || indS[b] === null) continue;
                if (sub[b].low < sub[a].low && indS[b] > indS[a])
                  out.push({ type: 'BULLISH', ind: name,
                    ta: cands[from+a].time, tb: cands[from+b].time,
                    pa: cands[from+a].low,  pb: cands[from+b].low,
                    va: indS[a], vb: indS[b],
                    fresh: (from + b) >= n - FRESH_N,
                  });
              }
              // Bearish: precio HH + indicador LH
              for (let i = 1; i < hi.length; i++) {
                const a = hi[i-1], b = hi[i];
                if (indS[a] === null || indS[b] === null) continue;
                if (sub[b].high > sub[a].high && indS[b] < indS[a])
                  out.push({ type: 'BEARISH', ind: name,
                    ta: cands[from+a].time, tb: cands[from+b].time,
                    pa: cands[from+a].high, pb: cands[from+b].high,
                    va: indS[a], vb: indS[b],
                    fresh: (from + b) >= n - FRESH_N,
                  });
              }
              return out;
            }

            // ════════════════════════════════════
            // HELPERS
            // ════════════════════════════════════
            const fp = n => n === null || n === undefined ? '—'
              : n >= 100 ? n.toFixed(2) : n >= 1 ? n.toFixed(3) : n.toFixed(5);
            const ft = u => new Date(u * 1000).toISOString()
              .replace('T', ' ').slice(0, 16) + ' UTC';
            const em = t => t === 'BULLISH' ? '🟢' : '🔴';
            const dr = t => t === 'BULLISH' ? '▲ ALCISTA' : '▼ BAJISTA';

            // ════════════════════════════════════
            // DEDUPLICAR — evitar issues repetidos
            // ════════════════════════════════════
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              labels: 'divergence',
              state:  'open',
              per_page: 50,
            });
            const openTitles = new Set(existing.data.map(i => i.title));

            // ════════════════════════════════════
            // SCAN
            // ════════════════════════════════════
            let created = 0;

            for (const { label, mins } of TIMEFRAMES) {
              console.log(`\n── ${ASSET_LABEL} / ${label} ──`);
              try {
                const cands     = await fetchKlines(KRAKEN_PAIR, mins);
                const closes    = cands.map(c => c.close);
                const rsi       = calcRSI(closes);
                const macd      = calcMACD(closes);
                const obv       = calcOBV(cands);
                const lastClose = cands[cands.length - 1].close;
                const lastRSI   = rsi.slice().reverse().find(v => v !== null);

                const divs = [
                  ...detectDivs(cands, rsi,  'RSI'),
                  ...detectDivs(cands, macd, 'MACD'),
                  ...detectDivs(cands, obv,  'OBV'),
                ];

                // Confluencia: cuántos indicadores coinciden en la misma dirección
                const fresh     = divs.filter(d => d.fresh);
                const bullScore = ['RSI','MACD','OBV']
                  .filter(n => fresh.some(d => d.ind === n && d.type === 'BULLISH')).length;
                const bearScore = ['RSI','MACD','OBV']
                  .filter(n => fresh.some(d => d.ind === n && d.type === 'BEARISH')).length;
                const confLabel = bullScore >= 2
                  ? `⚡ ${bullScore}/3 BULL confluence`
                  : bearScore >= 2
                  ? `⚡ ${bearScore}/3 BEAR confluence`
                  : 'Sin confluencia';

                console.log(`   Divs: ${divs.length} | Fresh: ${fresh.length} | Bull: ${bullScore}/3 Bear: ${bearScore}/3`);

                const toAlert = FORCE ? divs.slice(-3) : fresh;

                for (const d of toAlert) {
                  const title = `${em(d.type)} [${ASSET_LABEL}·${label}] ${dr(d.type)} ${d.ind} · ${ft(d.tb)}`;
                  if (openTitles.has(title)) {
                    console.log(`   Duplicado, omitiendo: ${d.ind}`);
                    continue;
                  }

                  const obvNote = d.ind === 'OBV'
                    ? '\n> 💡 **OBV no se puede manipular** — esta señal tiene mayor peso que RSI/MACD.'
                    : '';

                  const body = `
## ${em(d.type)} Divergencia ${dr(d.type)} — ${ASSET_LABEL} ${label}

| Campo | Valor |
|---|---|
| **Par** | ${ASSET_LABEL} (Kraken) |
| **Timeframe** | ${label} |
| **Indicador** | **${d.ind}** |
| **Pivot 1** | ${ft(d.ta)} — Precio \`$${fp(d.pa)}\` — ${d.ind}: \`${typeof d.va === 'number' ? d.va.toFixed(4) : d.va}\` |
| **Pivot 2** | ${ft(d.tb)} — Precio \`$${fp(d.pb)}\` — ${d.ind}: \`${typeof d.vb === 'number' ? d.vb.toFixed(4) : d.vb}\` |
| **Precio actual** | \`$${fp(lastClose)}\` |
| **RSI actual** | \`${lastRSI?.toFixed(2) ?? '—'}\` |
| **Confluencia** | ${confLabel} |

---

> ${d.type === 'BULLISH'
    ? '🟢 **Divergencia alcista:** precio baja pero ' + d.ind + ' sube → posible agotamiento bajista.'
    : '🔴 **Divergencia bajista:** precio sube pero ' + d.ind + ' baja → posible agotamiento alcista.'}
${obvNote}

**Confirmar siempre** con acción del precio y contexto de mercado antes de operar.

🔗 [Ver en TradingView — ${ASSET_LABEL} ${label}](https://www.tradingview.com/chart/?symbol=KRAKEN:ZECUSD&interval=${mins === 60 ? '60' : '240'})

---
*🤖 Divergence Scanner · ${new Date().toISOString()}*
                  `.trim();

                  await github.rest.issues.create({
                    owner:  context.repo.owner,
                    repo:   context.repo.repo,
                    title,
                    body,
                    labels: ['divergence', d.type.toLowerCase(), label.toLowerCase(), 'zec', d.ind.toLowerCase()],
                  });

                  console.log(`   ✅ Issue: ${title}`);
                  created++;
                  await new Promise(r => setTimeout(r, 500)); // rate limit safety
                }

              } catch (err) {
                console.error(`   ❌ Error en ${label}:`, err.message);
              }

              await new Promise(r => setTimeout(r, 400));
            }

            console.log(`\n📊 Scan completo — Issues creados: ${created}`);
            if (created === 0) console.log('Sin divergencias frescas en esta ejecución.');
